<!DOCTYPE html>
<html>
<head>
<title>Sign In - FilmLedger</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body{
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
  }
  .box{
    background:#1c1c1c;
    padding:40px;
    border-radius:14px;
    width:320px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 30px rgba(0,0,0,.6);
  }
  h2{ margin:0 0 18px; }
  input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#2a2a2a;
    border:1px solid rgba(255,255,255,.08);
    color:white;
    border-radius:10px;
    box-sizing:border-box;
  }
  button{
    width:100%;
    padding:12px;
    background:#e50914;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:10px;
    font-weight:bold;
    margin-top:8px;
  }
  button:hover{ background:#ff1f2f; }
  a{ color:#bbb; text-decoration:none; display:block; margin-top:12px; text-align:center; }
</style>
</head>
<body>
  <div class="box">
    <h2>Sign In</h2>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <button>Sign In</button>
    <a href="index.html">← Back to FilmLedger</a>
  </div>
</body>
</html>
