<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FilmLedger</title>

<style>
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
  }

  /* NAVBAR */
  .navbar{
    position:fixed;
    top:0; left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 60px;
    background:rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    z-index:1000;
    box-sizing:border-box;
  }
  .logo{
    font-size:26px;
    font-weight:bold;
    letter-spacing:2px;
    color:#e50914;
  }
  .nav-right{ display:flex; align-items:center; gap:14px; }
  .lang-btn{
    background:transparent;
    border:1px solid #aaa;
    color:white;
    padding:7px 12px;
    border-radius:6px;
    cursor:pointer;
  }
  .signin{
    color:white;
    text-decoration:none;
    font-size:14px;
    opacity:.9;
  }
  .signin:hover{ opacity:1; }
  .watch-btn{
    background:#e50914;
    border:none;
    color:white;
    padding:9px 16px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
  }
  .watch-btn:hover{ background:#ff1f2f; }

  /* HERO SLIDESHOW */
  .hero{
    position:relative;
    height:82vh;
    display:flex;
    align-items:center;
    padding:110px 60px 60px;
    background-size:cover;
    background-position:center;
    transition:all .5s ease;
    box-sizing:border-box;
  }
  .overlay{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(to right, rgba(0,0,0,.90) 42%, rgba(0,0,0,.20));
  }
  .hero-content{
    position:relative;
    z-index:2;
    max-width:650px;
  }
  .hero h1{
    font-size:52px;
    margin:0 0 10px;
    line-height:1.05;
  }
  .meta{
    opacity:.85;
    margin-bottom:14px;
    font-size:15px;
  }
  .rating{
    color:#ffd700;
    font-size:20px;
    margin-bottom:14px;
  }
  .description{
    line-height:1.6;
    opacity:.92;
    margin-bottom:18px;
    font-size:15px;
  }
  .hero-poster{
    position:absolute;
    right:70px;
    height:440px;
    width:auto;
    border-radius:16px;
    box-shadow:0 0 50px rgba(0,0,0,.65);
    z-index:2;
    border:1px solid rgba(255,255,255,.08);
    background:#222;
  }

  /* HERO CONTROLS */
  .controls{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .btn{
    background:#e50914;
    border:none;
    padding:12px 18px;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
  }
  .btn:hover{ background:#ff1f2f; }
  .btn.secondary{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
  }
  .btn.secondary:hover{ background:rgba(255,255,255,.18); }

  /* FILTER BAR */
  .filter-bar{
    margin-top:-34px;
    padding:0 60px 30px;
    box-sizing:border-box;
  }
  .filter-card{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    background:rgba(0,0,0,.70);
    border:1px solid rgba(255,255,255,.10);
    border-radius:14px;
    padding:14px;
    backdrop-filter: blur(10px);
  }
  .filter-card input,
  .filter-card select{
    padding:11px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:white;
    font-size:14px;
    outline:none;
    min-width: 200px;
  }
  .filter-card input::placeholder{
    color: rgba(255,255,255,.55);
  }
  .count{
    margin-left:auto;
    opacity:.8;
    font-size:13px;
    padding:0 6px;
    white-space:nowrap;
  }

  /* TABLE */
  .table-section{
    background:#fff;
    color:#000;
    padding:40px 60px 60px;
  }
  .table-section h2{
    margin:0 0 18px;
    font-size:24px;
  }

  /* ✅ Mobile-friendly table container */
  .table-wrap{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling: touch;
    border-radius:12px;
  }
  table{
    width:100%;
    min-width: 950px; /* keeps columns readable, scroll on mobile */
    border-collapse:collapse;
    background:#fff;
  }
  th{
    background:#111;
    color:white;
    padding:12px;
    text-align:left;
    position:sticky;
    top:0;
  }
  td{
    padding:12px;
    border-bottom:1px solid #ddd;
    vertical-align:top;
    font-size:14px;
  }
  tr:hover td{ background:#f6f6f6; }
  .poster-small{
    height:120px;
    border-radius:10px;
    border:1px solid #ddd;
    background:#eee;
  }

  /* ERROR BOX */
  .error{
    max-width:1100px;
    margin:20px auto 0;
    background:#2a0005;
    border:1px solid #ff7a86;
    color:#ffd6da;
    padding:12px 14px;
    border-radius:10px;
    display:none;
    white-space:pre-wrap;
  }

  @media (max-width: 900px){
    .hero{ padding:110px 18px 46px; height:78vh; }
    .hero-poster{ display:none; }
    .navbar{ padding:14px 16px; }
    .filter-bar{ padding:0 16px 22px; margin-top:-22px; }
    .table-section{ padding:26px 16px 44px; }
    .count{ margin-left:0; width:100%; }
    .filter-card input, .filter-card select{ min-width: 100%; }
  }
</style>
</head>

<body>

<header class="navbar">
  <div class="logo">FILMLEDGER</div>
  <div class="nav-right">
    <button class="lang-btn">EN</button>
    <a class="signin" href="signin.html">Sign In</a>
    <button class="watch-btn" onclick="location.href='signin.html'">Watch Now</button>
  </div>
</header>

<div id="errorBox" class="error"></div>

<div class="hero" id="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1 id="title">Loading…</h1>
    <div class="meta" id="meta"></div>
    <div class="rating" id="rating"></div>
    <div class="description" id="description"></div>

    <div class="controls">
      <button class="btn secondary" onclick="prev()">◀ Prev</button>
      <button class="btn secondary" onclick="next()">Next ▶</button>
    </div>
  </div>

  <img id="poster" class="hero-poster" alt="Movie poster" />
</div>

<div class="filter-bar">
  <div class="filter-card">
    <input id="searchInput" type="text" placeholder="Search title, genre, description…" />
    <select id="genreSelect">
      <option value="">All Genres</option>
    </select>
    <select id="yearSelect">
      <option value="">All Years</option>
    </select>
    <select id="sortSelect">
      <option value="rating_desc">Sort: Rating (High → Low)</option>
      <option value="rating_asc">Sort: Rating (Low → High)</option>
      <option value="date_desc">Sort: Release Date (New → Old)</option>
      <option value="date_asc">Sort: Release Date (Old → New)</option>
      <option value="title_asc">Sort: Title (A → Z)</option>
      <option value="title_desc">Sort: Title (Z → A)</option>
    </select>
    <div class="count" id="countText">Loading…</div>
  </div>
</div>

<div class="table-section">
  <h2>All Movies</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Poster</th>
          <th>Title</th>
          <th>Release</th>
          <th>Genres</th>
          <th>Rating</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="movies"></tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://njacnizuppgxlcroosva.supabase.co";
  const SUPABASE_KEY = "sb_publishable_pmSNF4okxKfphB1Rr19Q0w_n550JOla";
  const VIEW = "movies_gui";
  const TMDB_IMG_BASE = "https://image.tmdb.org/t/p/w500";

  let allMovies = [];
  let movies = [];
  let index = 0;

  const $ = (id) => document.getElementById(id);

  function showError(msg){
    $("errorBox").style.display = "block";
    $("errorBox").textContent = msg;
  }
  function clearError(){
    $("errorBox").style.display = "none";
    $("errorBox").textContent = "";
  }

  function posterUrl(path){
    if (!path) return "";
    path = String(path).trim();
    if (path.startsWith("http://") || path.startsWith("https://")) return path;
    if (path.startsWith("/")) return TMDB_IMG_BASE + path;
    return TMDB_IMG_BASE + "/" + path;
  }

  function stars(r){
    const n = Math.round(Number(r) || 0);
    return "★".repeat(Math.max(0, Math.min(5, n)));
  }

  function yearOf(releaseDate){
    if (!releaseDate) return "";
    return String(releaseDate).substring(0,4);
  }

  // ✅ robust: handles "Action, Drama" strings OR nulls
  function splitGenres(genresStr){
    return (genresStr || "")
      .split(",")
      .map(x => x.trim())
      .filter(Boolean);
  }

  async function loadMovies(){
    clearError();
    $("countText").textContent = "Loading…";

    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${VIEW}?select=*`, {
        headers:{
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      });

      if(!res.ok){
        const txt = await res.text();
        throw new Error(
          `Supabase REST failed (${res.status}).\n\n${txt}\n\n` +
          `Most common fix:\n- Turn OFF RLS on the view or underlying tables\n- OR add a SELECT policy for anon/public access.`
        );
      }

      const data = await res.json();

      if(!Array.isArray(data) || data.length === 0){
        throw new Error("No rows returned from movies_gui. Your view may be empty or blocked by RLS.");
      }

      allMovies = data;

      buildFilterOptions(allMovies);
      applyFilters(); // set movies + render slideshow/table

    }catch(e){
      showError(e.message);
      $("countText").textContent = "Failed to load";
    }
  }

  function buildFilterOptions(list){
    const genreSet = new Set();
    const yearSet = new Set();

    list.forEach(m => {
      const y = yearOf(m.release_date);
      if (y) yearSet.add(y);

      splitGenres(m.genres).forEach(g => genreSet.add(g));
    });

    // ✅ populate genres
    const genreSelect = $("genreSelect");
    const genres = Array.from(genreSet).sort((a,b)=>a.localeCompare(b));
    genreSelect.innerHTML =
      `<option value="">All Genres</option>` +
      genres.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join("");

    // ✅ populate years (desc)
    const yearSelect = $("yearSelect");
    const years = Array.from(yearSet).sort((a,b)=>Number(b)-Number(a));
    yearSelect.innerHTML =
      `<option value="">All Years</option>` +
      years.map(y => `<option value="${y}">${y}</option>`).join("");
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function applyFilters(){
    const q = $("searchInput").value.trim().toLowerCase();
    const genre = $("genreSelect").value;
    const year = $("yearSelect").value;
    const sort = $("sortSelect").value;

    movies = allMovies.filter(m => {
      const hay = [m.title, m.genres, m.description]
        .map(x => (x || "").toString().toLowerCase())
        .join(" ");

      if (q && !hay.includes(q)) return false;

      if (genre){
        const gs = splitGenres(m.genres);
        if (!gs.includes(genre)) return false;
      }

      if (year){
        if (yearOf(m.release_date) !== year) return false;
      }

      return true;
    });

    movies.sort((a,b) => {
      const ar = Number(a.rating ?? -999);
      const br = Number(b.rating ?? -999);
      const ad = a.release_date ? new Date(a.release_date).getTime() : 0;
      const bd = b.release_date ? new Date(b.release_date).getTime() : 0;
      const at = (a.title || "").toLowerCase();
      const bt = (b.title || "").toLowerCase();

      switch(sort){
        case "rating_desc": return br - ar;
        case "rating_asc": return ar - br;
        case "date_desc": return bd - ad;
        case "date_asc": return ad - bd;
        case "title_desc": return bt.localeCompare(at);
        case "title_asc":
        default: return at.localeCompare(bt);
      }
    });

    $("countText").textContent = `${movies.length} movies shown`;

    index = 0;
    showSlide();
    buildTable();
  }

  function showSlide(){
    if(!movies.length){
      $("title").textContent = "No movies match your filters";
      $("meta").textContent = "";
      $("rating").textContent = "";
      $("description").textContent = "";
      $("poster").src = "";
      $("hero").style.backgroundImage =
        "linear-gradient(to right, rgba(0,0,0,.92), rgba(0,0,0,.25))";
      return;
    }

    const m = movies[index];
    const year = yearOf(m.release_date) || "—";
    const img = posterUrl(m.poster_path);

    $("title").textContent = m.title || "—";
    $("meta").textContent = `${year} • ${m.genres || "—"}`;

    const r = Number(m.rating);
    $("rating").textContent = Number.isFinite(r)
      ? `${stars(r)} (${r.toFixed(1)})`
      : `Rating: —`;

    $("description").textContent = m.description || "—";

    $("poster").src = img;
    $("hero").style.backgroundImage =
      img
      ? `linear-gradient(to right, rgba(0,0,0,.92), rgba(0,0,0,.25)), url('${img}')`
      : `linear-gradient(to right, rgba(0,0,0,.92), rgba(0,0,0,.25))`;
  }

  function next(){
    if(!movies.length) return;
    index = (index + 1) % movies.length;
    showSlide();
  }
  function prev(){
    if(!movies.length) return;
    index = (index - 1 + movies.length) % movies.length;
    showSlide();
  }

  function buildTable(){
    let html = "";

    movies.forEach(m => {
      const img = posterUrl(m.poster_path);
      const r = Number(m.rating);
      html += `
        <tr>
          <td><img class="poster-small" src="${img}" alt="${escapeHtml(m.title || "poster")}"></td>
          <td>${escapeHtml(m.title || "—")}</td>
          <td>${escapeHtml(m.release_date || "—")}</td>
          <td>${escapeHtml(m.genres || "—")}</td>
          <td>${Number.isFinite(r) ? r.toFixed(1) : "—"}</td>
          <td>${escapeHtml(m.description || "—")}</td>
        </tr>
      `;
    });

    $("movies").innerHTML = html;
  }

  // events
  $("searchInput").addEventListener("input", applyFilters);
  $("genreSelect").addEventListener("change", applyFilters);
  $("yearSelect").addEventListener("change", applyFilters);
  $("sortSelect").addEventListener("change", applyFilters);

  loadMovies();
</script>

</body>
</html>
