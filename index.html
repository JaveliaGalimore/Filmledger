<!DOCTYPE html>
<html>
<head>
<title>FilmLedger</title>

<style>

body {
font-family: Arial;
background:#f4f4f4;
margin:40px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#222;
color:white;
}

tr:hover{
background:#f0f0f0;
}

.searchBox{
width:300px;
padding:10px;
margin-bottom:20px;
font-size:16px;
}

</style>

</head>

<body>

<h1>FilmLedger Movie Database</h1>

<input 
class="searchBox"
id="search"
placeholder="Search movies..."
onkeyup="searchMovies()"
/>

<table id="moviesTable">

<thead>

<tr>
<th>Title</th>
<th>Release Date</th>
<th>Genres</th>
<th>Rating</th>
<th>Description</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

<script>

const SUPABASE_URL =
"https://njacnizuppgxlcroosva.supabase.co";

const API_KEY =
"sb_publishable_pmSNF4okxKfphB1Rr19Q0w_n550JOla";

async function loadMovies(){

const response = await fetch(
SUPABASE_URL +
"/rest/v1/movies_gui?select=*",
{
headers:{
apikey:API_KEY
}
});

const data = await response.json();

displayMovies(data);

window.movies=data;

}

function displayMovies(movies){

const table=document.querySelector("tbody");

table.innerHTML="";

movies.forEach(movie=>{

const row=`
<tr>

<td>${movie.title}</td>

<td>${movie.release_date}</td>

<td>${movie.genres}</td>

<td>${movie.rating}</td>

<td>${movie.description}</td>

</tr>
`;

table.innerHTML+=row;

});

}

function searchMovies(){

const text=
document.getElementById("search")
.value
.toLowerCase();

const filtered=
window.movies.filter(m=>
m.title.toLowerCase().includes(text)
);

displayMovies(filtered);

}

loadMovies();

</script>

</body>
</html>
